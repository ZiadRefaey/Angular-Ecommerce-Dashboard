<div
  class="rounded-[14px] border border-[#dde5ef] bg-white px-5 py-10 shadow-[0_1px_2px_rgba(16,24,40,0.04)]"
>
  <div class="flex flex-col items-center justify-center gap-4">
    <p-progress-spinner
      strokeWidth="4"
      animationDuration=".9s"
      [style]="{ width: '52px', height: '52px' }"
      styleClass="shared-loading-spinner"
    ></p-progress-spinner>
    <p class="text-[14px] font-medium text-[#667085]">{{ message }}</p>
  </div>
</div>
