<article
  class="rounded-[14px] border border-[#dde5ef] bg-white px-5 py-5 shadow-[0_1px_2px_rgba(16,24,40,0.04)]"
>
  <div class="flex items-center gap-4">
    <div class="flex h-10 w-10 items-center justify-center rounded-full" [ngClass]="iconBgClass">
      <i class="text-[18px]" [ngClass]="[iconClass, iconColorClass]"></i>
    </div>

    <div>
      <p class="text-[11px] font-semibold uppercase tracking-[0.12em] text-[#7c8ba1]">
        {{ title }}
      </p>
      <h3 class="mt-1 text-[18px] font-bold leading-none text-[#101828]">
        {{ value }}
      </h3>
    </div>
  </div>
</article>
