@if (isOpen) {
  <button
    type="button"
    class="fixed inset-0 z-30 bg-[#101828]/45 lg:hidden"
    (click)="closeSidebar()"
  ></button>
}

<aside
  class="fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-gray-900 text-white transition-transform duration-300 lg:static lg:row-span-2 lg:translate-x-0"
  [ngClass]="isOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
>
  <div class="flex w-full items-center justify-between border-b border-gray-700 p-4">
    <div>
      <h1 class="flex items-center gap-3 text-lg font-bold">
        <img src="/logo.svg" alt="ITI E-commerce logo" class="h-10 w-10 shrink-0" />
        <span>ITI E-commerce</span>
      </h1>
      <p class="text-xs text-gray-400">Electronics Store</p>
    </div>
    <button
      type="button"
      class="text-gray-400 transition hover:text-white lg:hidden"
      (click)="closeSidebar()"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <nav class="mt-4 flex w-full flex-col gap-2 px-4">
    <a
      routerLink="/dashboard"
      class="flex items-center gap-3 rounded p-2 transition-all duration-200"
      [ngClass]="currentUrl.includes('dashboard') ? 'bg-blue-700' : 'hover:bg-gray-800'"
      (click)="closeSidebar()"
    >
      <i class="pi pi-th-large"></i>
      Dashboard
    </a>
    <a
      routerLink="/products"
      class="flex items-center gap-3 rounded p-2 transition-all duration-200"
      [ngClass]="currentUrl.includes('products') ? 'bg-blue-700' : 'hover:bg-gray-800'"
      (click)="closeSidebar()"
    >
      <i class="pi pi-box"></i>
      Products
    </a>
    <a
      routerLink="/categories"
      class="flex items-center gap-3 rounded p-2 transition-all duration-200"
      [ngClass]="currentUrl.includes('categories') ? 'bg-blue-700' : 'hover:bg-gray-800'"
      (click)="closeSidebar()"
    >
      <i class="pi pi-sitemap"></i>
      Categories
    </a>
    <a
      routerLink="/orders"
      class="flex items-center gap-3 rounded p-2 transition-all duration-200"
      [ngClass]="currentUrl.includes('orders') ? 'bg-blue-700' : 'hover:bg-gray-800'"
      (click)="closeSidebar()"
    >
      <i class="pi pi-shopping-cart"></i>
      Orders
    </a>
  </nav>

  <div class="mt-auto flex w-full flex-col gap-1 px-4 py-6">
    <button
      (click)="logout()"
      class="flex items-center gap-3 rounded p-2 font-medium text-red-500 transition-all duration-200 hover:bg-red-600 hover:text-white"
    >
      <i class="pi pi-sign-out"></i>
      Logout
    </button>
  </div>
</aside>
