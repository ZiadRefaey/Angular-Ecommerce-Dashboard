<!-- Header -->
<div class="flex items-center justify-between p-4 border-b border-gray-700 w-full">
  <div>
    <h1 class="text-lg font-bold flex items-center gap-2">
      <svg class="w-6 h-6 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
        <path d="M13 2L3 14h9v8l10-12h-9z" />
      </svg>
      ITI Arish Admin
    </h1>
    <p class="text-xs text-gray-400">Electronics Store</p>
  </div>
  <button class="md:hidden text-gray-400 hover:text-white">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>

<!-- Menu -->
<nav class="mt-4 flex flex-col gap-2 px-4 w-full">
  <a
    routerLink="/dashboard"
    class="flex items-center gap-3 p-2 rounded transition-all duration-200"
    [ngClass]="currentUrl.includes('dashboard') ? 'bg-blue-700' : 'hover:bg-gray-800'"
  >
    <i class="pi pi-th-large"></i>
    Dashboard
  </a>
  <a
    routerLink="/products"
    class="flex items-center gap-3 p-2 rounded transition-all duration-20"
    [ngClass]="currentUrl.includes('products') ? 'bg-blue-700' : 'hover:bg-gray-800'"
  >
    <i class="pi pi-box"></i>
    Products
  </a>
  <a
    routerLink="/categories"
    class="flex items-center gap-3 p-2 rounded transition-all duration-20"
    [ngClass]="currentUrl.includes('categories') ? 'bg-blue-700' : 'hover:bg-gray-800'"
  >
    <i class="pi pi-sitemap"></i>

    Categories
  </a>
  <a
    routerLink="/orders"
    class="flex items-center gap-3 p-2 rounded transition-all duration-20"
    [ngClass]="currentUrl.includes('orders') ? 'bg-blue-700' : 'hover:bg-gray-800'"
  >
    <i class="pi pi-shopping-cart"></i>

    Orders
  </a>
</nav>

<div class="mt-auto px-4 py-6 flex flex-col gap-1 w-full">
  <a
    href="#"
    class="flex items-center gap-3 p-2 rounded hover:bg-red-600 text-red-500 hover:text-white font-medium transition-all duration-200"
  >
    <i class="pi pi-sign-out"></i>
    Logout
  </a>
</div>
