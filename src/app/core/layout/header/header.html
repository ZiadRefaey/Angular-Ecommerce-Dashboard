<header class="flex items-center justify-between border-b bg-white px-6 py-3">
  <div class="relative w-full max-w-md">
    <div class="flex items-center rounded-lg bg-gray-100 px-3 py-2">
      <i class="pi pi-search mr-3 text-gray-400"></i>
      <input
        type="text"
        [value]="searchTerm"
        placeholder="Search products..."
        class="w-full bg-transparent text-sm text-gray-600 outline-none placeholder-gray-400"
        (input)="onSearchInput($any($event.target).value)"
        (focus)="onSearchFocus()"
      />
    </div>

    @if (isDropdownOpen) {
      <div class="search-dropdown absolute left-0 right-0 top-[calc(100%+0.5rem)] z-50 overflow-hidden rounded-2xl border border-[#dbe4f0] bg-white shadow-[0_20px_45px_rgba(16,24,40,0.14)]">
        @if (isLoading) {
          <div class="flex flex-col items-center justify-center gap-3 px-4 py-6">
            <p-progress-spinner
              strokeWidth="4"
              animationDuration=".8s"
              [style]="{ width: '32px', height: '32px' }"
              styleClass="header-search-spinner"
            ></p-progress-spinner>
            <p class="text-sm font-medium text-[#667085]">Searching products...</p>
          </div>
        } @else if (errorMessage) {
          <div class="px-4 py-4 text-sm font-medium text-[#f04438]">
            {{ errorMessage }}
          </div>
        } @else if (showEmptyState) {
          <div class="px-4 py-4 text-sm font-medium text-[#667085]">No matching products found.</div>
        } @else {
          <div class="py-2">
            @for (product of searchResults; track product._id) {
              <button
                type="button"
                class="flex w-full items-center gap-3 px-4 py-3 text-left transition hover:bg-[#f8fbff]"
                (click)="navigateToProduct(product)"
              >
                <img
                  [src]="product.image"
                  [alt]="product.name"
                  class="h-11 w-11 rounded-xl border border-[#eaecf0] object-cover"
                />
                <div class="min-w-0 flex-1">
                  <p class="truncate text-sm font-semibold text-[#101828]">{{ product.name }}</p>
                  <p class="truncate text-xs text-[#667085]">{{ product.description }}</p>
                </div>
                <span class="text-xs font-medium text-[#2f6bff]">Open</span>
              </button>
            }
          </div>
        }
      </div>
    }
  </div>

  <div class="ml-6 flex items-center gap-4">
    <div class="h-6 w-px bg-gray-300"></div>

    <div class="flex items-center gap-3">
      <div class="text-right">
        <p class="text-sm font-medium text-gray-800">Ziad Refaey</p>
        <p class="text-xs text-gray-500">Admin</p>
      </div>

      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-orange-200 font-semibold text-white">
        M
      </div>
    </div>
  </div>
</header>
