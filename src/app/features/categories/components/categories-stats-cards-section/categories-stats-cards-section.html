<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
  @for (card of statsCards; track card.title) {
    <app-stats-card
      [iconClass]="card.iconClass"
      [iconWrapperClass]="card.iconWrapperClass"
      [title]="card.title"
      [value]="card.value"
    ></app-stats-card>
  }
</div>
