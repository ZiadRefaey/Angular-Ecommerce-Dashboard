<div class="bg-white">
  <div class="flex flex-col gap-3 border-b border-[#edf2f7] px-4 py-3 md:flex-row md:items-center md:justify-between md:px-5">
    <p class="text-[14px] font-medium text-[#667085]">Category Inventory</p>
    <p class="text-[14px] text-[#667085]">
      Showing {{ showingFrom }}-{{ showingTo }} of {{ totalItems }} categories
    </p>
  </div>

  <app-data-table
    [data]="categories"
    [columns]="columns"
    [minWidth]="'100%'"
    [showHeader]="false"
    [cardClass]="'!rounded-none !border-0 !shadow-none'"
    [bodyTemplate]="body"
  ></app-data-table>

  <ng-template #body let-category let-mobile="mobile">
    @if (mobile) {
      <div class="px-4 py-4">
        <div class="flex items-start justify-between gap-3">
          <p class="font-semibold text-[#101828]">
            {{ category.name }}
          </p>

          <app-status-badge
            [label]="category.status"
            [variant]="getStatusVariant(category.status)"
          ></app-status-badge>
        </div>

        <div class="mt-2 text-[13px] text-[#667085]">
          <strong>{{ category.productsCount }}</strong> Products
        </div>

        <div class="mt-3 flex items-center justify-between">
          <span class="text-[12px] text-[#98a2b3]">
            {{ category.createdAt }}
          </span>

          <div class="flex gap-3">
            <i class="pi pi-eye text-[#667085]"></i>
            <i class="pi pi-ellipsis-h text-[#667085]"></i>
          </div>
        </div>
      </div>
    } @else {
      <tr>
        <td class="table-body-cell font-semibold text-[#101828]">
          {{ category.name }}
        </td>

        <td class="table-body-cell">
          <span class="font-semibold text-[#101828]">
            {{ category.productsCount }}
          </span>
          <span class="text-[#667085]"> Products</span>
        </td>

        <td class="table-body-cell">
          <app-status-badge
            [label]="category.status"
            [variant]="getStatusVariant(category.status)"
          ></app-status-badge>
        </td>

        <td class="table-body-cell text-[#667085]">
          {{ category.createdAt }}
        </td>

        <td class="table-body-cell">
          <div class="flex justify-end gap-4">
            <i class="pi pi-eye text-[#667085]"></i>
            <i class="pi pi-ellipsis-h text-[#667085]"></i>
          </div>
        </td>
      </tr>
    }
  </ng-template>
</div>
