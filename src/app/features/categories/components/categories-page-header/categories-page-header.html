<div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
  <div>
    <h1 class="text-[22px] font-bold text-[#101828]">Categories</h1>
    <p class="mt-1 text-[14px] text-[#667085]">
      Organize and manage product categories in your store
    </p>
  </div>

  <button
    type="button"
    class="inline-flex h-11 cursor-pointer items-center gap-2 self-start rounded-[10px] bg-[#2f6bff] px-4 text-[14px] font-semibold text-white shadow-[0_8px_20px_rgba(47,107,255,0.25)] transition-all duration-200 hover:opacity-90"
    (click)="onAddCategory()"
  >
    <i class="pi pi-plus text-[13px]"></i>
    <span>Add Category</span>
  </button>
</div>
