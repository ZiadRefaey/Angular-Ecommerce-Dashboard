<app-modal
  [isOpen]="isOpen"
  title="Add New Category"
  [widthClass]="'max-w-96'"
  (closed)="onClose()"
>
  <form [formGroup]="categoryForm" class="space-y-5" (ngSubmit)="onCreateCategory()">
    <div>
      <label
        class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
      >
        Category Name
      </label>

      <input
        type="text"
        formControlName="name"
        placeholder="e.g. Electronics"
        class="h-11 w-full rounded-lg border px-4 text-[14px] text-[#101828] outline-none placeholder:text-[#98a2b3] transition"
        [ngClass]="
          hasError() ? 'border-[#f04438] bg-[#fff7f7]' : 'border-[#eaecf0] bg-[#f9fafb] focus:border-[#2f6bff] focus:bg-white'
        "
      />

      @if (hasError('required')) {
        <p class="mt-2 text-[13px] font-medium text-[#f04438]">Category name is required.</p>
      } @else if (hasError('minlength')) {
        <p class="mt-2 text-[13px] font-medium text-[#f04438]">
          Category name must be at least 2 characters.
        </p>
      }

      @if (errorMessage) {
        <p class="mt-2 text-[13px] font-medium text-[#f04438]">{{ errorMessage }}</p>
      }
    </div>

    <div class="flex items-center justify-end gap-3 pt-4">
      <button
        type="button"
        class="rounded-lg px-4 py-2 text-[14px] font-semibold text-[#667085] transition hover:bg-[#f9fafb]"
        (click)="onClose()"
        [disabled]="isSubmitting"
      >
        Cancel
      </button>

      <button
        type="submit"
        class="rounded-lg bg-[#2f6bff] px-5 py-2.5 text-[14px] font-semibold text-white shadow-[0_8px_20px_rgba(47,107,255,0.25)] transition hover:opacity-95"
        [disabled]="categoryForm.invalid || isSubmitting"
        [class.opacity-60]="categoryForm.invalid || isSubmitting"
        [class.pointer-events-none]="categoryForm.invalid || isSubmitting"
      >
        {{ isSubmitting ? 'Creating...' : 'Create Category' }}
      </button>
    </div>
  </form>
</app-modal>
