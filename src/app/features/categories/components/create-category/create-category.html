<app-modal
  [isOpen]="isOpen"
  title="Add New Category"
  [widthClass]="'max-w-[380px]'"
  (closed)="onClose()"
>
  <div class="space-y-5">
    <div>
      <label
        class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
      >
        Category Image
      </label>

      <div class="flex items-center gap-3">
        <label
          for="categoryImage"
          class="inline-flex h-9.5 cursor-pointer items-center gap-2 rounded-lg border border-[#d0d5dd] bg-white px-3 text-[13px] font-medium text-[#344054] transition hover:bg-[#f9fafb]"
        >
          <i class="pi pi-image text-[13px] text-[#2f6bff]"></i>
          <span>Select Image</span>
        </label>

        <input
          id="categoryImage"
          type="file"
          class="hidden"
          accept="image/*"
          (change)="onFileChange($event)"
        />

        <span class="text-[12px] text-[#98a2b3]">
          {{ selectedFileName || 'No file chosen (Max 5MB)' }}
        </span>
      </div>
    </div>

    <!-- Category Name -->
    <div>
      <label
        class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
      >
        Category Name
      </label>

      <input
        type="text"
        [(ngModel)]="categoryName"
        placeholder="e.g. Minimalist Decor"
        class="h-11 w-full rounded-lg border border-[#eaecf0] bg-[#f9fafb] px-4 text-[14px] text-[#101828] outline-none placeholder:text-[#98a2b3] focus:border-[#2f6bff] focus:bg-white"
      />
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 pt-4">
      <button
        type="button"
        class="rounded-lg px-4 py-2 text-[14px] font-semibold text-[#667085] transition hover:bg-[#f9fafb]"
        (click)="onClose()"
      >
        Cancel
      </button>

      <button
        type="button"
        class="rounded-lg bg-[#2f6bff] px-5 py-2.5 text-[14px] font-semibold text-white shadow-[0_8px_20px_rgba(47,107,255,0.25)] transition hover:opacity-95"
        (click)="onCreateCategory()"
      >
        Create Category
      </button>
    </div>
  </div>
</app-modal>
