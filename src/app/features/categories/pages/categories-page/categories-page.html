<section class="min-h-screen bg-[#f4f7fb] px-4 py-5 sm:px-5 lg:px-6">
  <div class="mx-auto w-full max-w-7xl">
    <app-categories-page-header
      (addCategory)="openCreateCategoryModal()"
    ></app-categories-page-header>

    <app-categories-stats-cards-section
      class="mt-7"
      [statsCards]="statsCards"
    ></app-categories-stats-cards-section>

    <div
      class="mt-7 overflow-hidden rounded-[14px] border border-[#dde5ef] bg-white shadow-[0_1px_2px_rgba(16,24,40,0.04)]"
    >
      @if (isLoading) {
        <app-loading-spinner message="Loading categories..."></app-loading-spinner>
      } @else if (errorMessage) {
        <div class="px-5 py-10 text-center">
          <p class="text-[14px] font-medium text-[#f04438]">{{ errorMessage }}</p>
        </div>
      } @else {
        <app-categories-filters
          [searchTerm]="searchTerm"
          [selectedSortField]="selectedSortField"
          [selectedSortDirection]="selectedSortDirection"
          [sortFields]="sortFields"
          (searchTermChange)="updateSearchTerm($event)"
          (selectedSortFieldChange)="updateSelectedSortField($event)"
          (selectedSortDirectionChange)="updateSelectedSortDirection($event)"
        ></app-categories-filters>

        <app-categories-table
          [categories]="paginatedCategories"
          [columns]="columns"
          [showingFrom]="showingFrom"
          [showingTo]="showingTo"
          [totalItems]="filteredAndSortedCategories.length"
          (deleteCategory)="requestDeleteCategory($event)"
        ></app-categories-table>

        <app-categories-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          [pageNumbers]="pageNumbers"
          (previousPage)="goToPreviousPage()"
          (nextPage)="goToNextPage()"
          (pageChange)="goToPage($event)"
        ></app-categories-pagination>
      }
    </div>
  </div>
  <app-create-category
    [isOpen]="isCreateCategoryModalOpen"
    (created)="refreshCategories()"
    (closed)="closeCreateCategoryModal()"
  ></app-create-category>

  <app-modal
    [isOpen]="confirmDeleteOpen"
    title="Delete Category"
    [widthClass]="'max-w-[420px]'"
    (closed)="closeDeleteModal()"
  >
    <div class="space-y-5">
      <p class="text-[14px] leading-6 text-[#475467]">
        Are you sure you want to delete
        <span class="font-semibold text-[#101828]">{{ pendingDeleteCategory?.name }}</span
        >?
      </p>

      @if (deleteErrorMessage) {
        <p class="text-[13px] font-medium text-[#f04438]">{{ deleteErrorMessage }}</p>
      }

      <div class="flex items-center justify-end gap-3">
        <button
          type="button"
          class="inline-flex h-10 items-center rounded-lg border border-[#d0d5dd] bg-white px-4 text-[14px] font-semibold text-[#475467] cursor-pointer hover:bg-slate-50 transition"
          [disabled]="isDeleting"
          [class.pointer-events-none]="isDeleting"
          [class.opacity-70]="isDeleting"
          (click)="closeDeleteModal()"
        >
          Cancel
        </button>

        <button
          type="button"
          class="inline-flex h-10 items-center gap-2 rounded-lg bg-[#f04438] px-4 text-[14px] font-semibold text-white transition hover:bg-[#d92d20]"
          [disabled]="isDeleting"
          [class.pointer-events-none]="isDeleting"
          [class.opacity-70]="isDeleting"
          (click)="confirmDeleteCategory()"
        >
          @if (isDeleting) {
            <i class="pi pi-spinner pi-spin text-[14px]"></i>
          }
          <span>{{ isDeleting ? 'Deleting...' : 'Delete' }}</span>
        </button>
      </div>
    </div>
  </app-modal>
</section>
