<section
  class="bg-[#f5f7fb] h-full overflow-y-scroll no-scrollbar px-4 py-5 sm:px-5 md:px-6 lg:px-7"
>
  <div class="mx-auto w-full max-w-7xl">
    <header class="mb-6">
      <h1 class="text-[22px] font-bold leading-tight text-slate-900">Dashboard Overview</h1>
      <p class="mt-1 text-[14px] font-medium text-slate-500">
        Monitor your store analytics and performance at a glance.
      </p>
    </header>

    @if (isLoading) {
      <app-loading-spinner message="Loading dashboard..."></app-loading-spinner>
    } @else if (errorMessage) {
      <div class="rounded-[14px] border border-[#fde2e1] bg-white px-5 py-10 text-center shadow-[0_1px_2px_rgba(16,24,40,0.04)]">
        <p class="text-[14px] font-medium text-[#f04438]">{{ errorMessage }}</p>
      </div>
    } @else {
      <app-stats-cards [stats]="stats"></app-stats-cards>
      <div class="mt-7">
        <app-recent-orders-table [orders]="recentOrders"></app-recent-orders-table>
      </div>
    }
  </div>
</section>
