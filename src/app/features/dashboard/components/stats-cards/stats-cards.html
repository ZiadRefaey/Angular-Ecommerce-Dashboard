<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5">
  <article
    *ngFor="let stat of stats"
    class="rounded-xl border border-[#e6ebf2] bg-white px-4 py-4 shadow-[0_1px_2px_rgba(16,24,40,0.04)]"
  >
    <div
      class="mb-4 flex h-8 w-8 items-center justify-center rounded--lg"
      [ngClass]="getIconBgClass(stat.icon)"
    >
      <ng-container [ngSwitch]="stat.icon">
        <!-- Users -->
        <svg
          *ngSwitchCase="'users'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"
          />
          <circle cx="9.5" cy="7" r="3" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-3-3.87" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>

        <!-- Products -->
        <svg
          *ngSwitchCase="'products'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 5V4h8v1" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h8" />
        </svg>

        <!-- Categories -->
        <svg
          *ngSwitchCase="'categories'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 3H5a2 2 0 0 0-2 2v5h7V3z" />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 14h-7v7h5a2 2 0 0 0 2-2v-5z"
          />
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 3h2l5 5v2h-7V3z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 14h7v7H5a2 2 0 0 1-2-2v-5z" />
        </svg>

        <!-- Orders -->
        <svg
          *ngSwitchCase="'orders'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <circle cx="9" cy="20" r="1" />
          <circle cx="18" cy="20" r="1" />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 4h2l2.4 10.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.76L20 7H7"
          />
        </svg>

        <!-- Revenue -->
        <svg
          *ngSwitchCase="'revenue'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <rect x="3" y="6" width="18" height="12" rx="2" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 12h10" />
          <circle cx="12" cy="12" r="2.5" />
        </svg>
      </ng-container>
    </div>

    <p class="text-[12px] font-semibold uppercase tracking-[0.06em] text-[#7b8aa0]">
      {{ stat.title }}
    </p>

    <h2 class="mt-1 text-[18px] font-bold leading-none text-slate-900">
      {{ stat.value }}
    </h2>
  </article>
</div>
