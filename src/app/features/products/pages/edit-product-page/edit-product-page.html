<section class="min-h-screen bg-[#f5f7fb] px-4 py-5 sm:px-5 lg:px-6">
  <div class="mx-auto max-w-7xl">
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <h1 class="text-[22px] font-bold leading-tight text-[#101828]">Edit Product</h1>

      <div class="flex items-center gap-3 self-start sm:self-auto">
        <button
          type="button"
          class="inline-flex h-11 items-center rounded-[10px] border border-[#d0d5dd] bg-white px-5 text-[14px] font-semibold text-[#475467] transition hover:bg-[#f8fafc]"
          (click)="onCancel()"
        >
          Cancel
        </button>

        <button
          type="button"
          class="inline-flex h-11 items-center rounded-[10px] bg-[#2f6bff] px-5 text-[14px] font-semibold text-white shadow-[0_8px_20px_rgba(47,107,255,0.25)] transition hover:opacity-95"
          (click)="onSave()"
        >
          Save Product
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1fr)_320px]">
      <div class="space-y-6">
        <app-product-basic-info
          [form]="basicInfoForm"
          [categories]="categories"
          [totalStock]="totalVariationStock"
        ></app-product-basic-info>

        <app-product-variations
          [variations]="variations"
          [activeVariationId]="activeVariationId"
          (variationMediaEdit)="onVariationMediaEdit($event)"
          (variationDefault)="onVariationDefault($event)"
          (variationDelete)="requestDeleteVariation($event)"
          (variationUpdate)="onVariationUpdate($event)"
          (addVariation)="onAddVariation()"
        ></app-product-variations>
      </div>

      <div class="space-y-6">
        <app-product-media
          [variation]="activeVariation"
          (uploadMedia)="onMediaUpload($event)"
          (selectMedia)="onMediaSelect($event)"
          (deleteMedia)="requestDeleteMedia($event)"
        ></app-product-media>

        <app-product-publishing [form]="publishingForm"></app-product-publishing>
      </div>
    </div>
  </div>

  <app-modal
    [isOpen]="confirmDeleteOpen"
    title="Delete Image"
    [widthClass]="'max-w-[420px]'"
    (closed)="closeDeleteModal()"
  >
    <div class="space-y-5">
      <p class="text-[14px] leading-6 text-[#475467]">
        Are you sure you want to delete this image? This action cannot be undone.
      </p>

      <div class="flex items-center justify-end gap-3">
        <button
          type="button"
          class="inline-flex h-10 items-center rounded-lg border border-[#d0d5dd] bg-white px-4 text-[14px] font-semibold text-[#475467]"
          (click)="closeDeleteModal()"
        >
          Cancel
        </button>

        <button
          type="button"
          class="inline-flex h-10 items-center rounded-lg bg-[#f04438] px-4 text-[14px] font-semibold text-white"
          (click)="confirmDeleteMedia()"
        >
          Delete
        </button>
      </div>
    </div>
  </app-modal>
  <app-modal
    [isOpen]="confirmDeleteVariationOpen"
    title="Delete Variation"
    [widthClass]="'max-w-[420px]'"
    (closed)="closeDeleteVariationModal()"
  >
    <div class="space-y-5">
      <p class="text-[14px] leading-6 text-[#475467]">
        Are you sure you want to delete this color variation?
      </p>

      <div class="flex items-center justify-end gap-3">
        <button
          type="button"
          class="inline-flex h-10 items-center rounded-lg border border-[#d0d5dd] bg-white px-4 text-[14px] font-semibold text-[#475467]"
          (click)="closeDeleteVariationModal()"
        >
          Cancel
        </button>

        <button
          type="button"
          class="inline-flex h-10 items-center rounded-lg bg-[#f04438] px-4 text-[14px] font-semibold text-white"
          (click)="confirmDeleteVariation()"
        >
          Delete
        </button>
      </div>
    </div>
  </app-modal>
</section>
