<div class="flex flex-wrap items-center gap-3">
  <label class="relative min-w-56 flex-1 md:max-w-xs">
    <i
      class="pi pi-search pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-[13px] text-[#98a2b3]"
    ></i>
    <input
      type="text"
      [ngModel]="searchTerm"
      (ngModelChange)="onSearchTermChange($event)"
      placeholder="Search by product name"
      class="h-10 w-full rounded-lg border border-[#d8e0ea] bg-white pl-9 pr-3 text-[14px] text-[#101828] outline-none transition placeholder:text-[#98a2b3] focus:border-[#2f6bff]"
    />
  </label>

  <select
    [ngModel]="selectedCategory"
    (ngModelChange)="onCategoryChange($event)"
    class="h-10 min-w-40 rounded-lg border border-[#d8e0ea] bg-white px-3 text-[14px] text-[#101828] outline-none transition focus:border-[#2f6bff]"
  >
    <option value="ALL">All Categories</option>
    @for (category of categoryOptions; track category.id) {
      <option [ngValue]="category.id">{{ category.name }}</option>
    }
  </select>

  <select
    [ngModel]="selectedStockStatus"
    (ngModelChange)="onStockStatusChange($event)"
    class="h-10 min-w-40 rounded-lg border border-[#d8e0ea] bg-white px-3 text-[14px] text-[#101828] outline-none transition focus:border-[#2f6bff]"
  >
    @for (stockOption of stockOptions; track stockOption) {
      <option [ngValue]="stockOption">
        {{
          stockOption === 'ALL'
            ? 'All Stock'
            : stockOption === 'IN_STOCK'
              ? 'In Stock'
              : stockOption === 'LOW_STOCK'
                ? 'Low Stock'
                : 'Out of Stock'
        }}
      </option>
    }
  </select>
</div>
