<div
  class="rounded-[18px] border border-[#dde5ef] bg-white p-6 shadow-[0_1px_2px_rgba(16,24,40,0.04)]"
>
  <div class="mb-6 flex items-center gap-3">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-[#eef4ff] text-[#2f6bff]">
      <i class="pi pi-image text-[14px]"></i>
    </div>
    <h2 class="text-[16px] font-semibold text-[#101828]">Product Media</h2>
  </div>

  @if (variation) {
    <div class="space-y-5">
      <div class="overflow-hidden rounded-[14px] bg-[#101828]">
        <img [src]="variation.image" [alt]="variation.name" class="h-62.5 w-full object-cover" />
      </div>

      <div>
        <div class="mb-3 flex items-center justify-between">
          <p class="text-[11px] font-semibold uppercase tracking-[0.08em] text-[#7b8aa0]">
            Media Gallery ({{ variation.media.length }})
          </p>
        </div>

        <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 xl:grid-cols-4">
          @for (image of variation.media; track image.id) {
            <div
              class="group relative overflow-hidden rounded-[10px] border transition"
              [ngClass]="
                image.isDefault ? 'border-[#2f6bff] ring-1 ring-[#2f6bff]' : 'border-[#e4e7ec]'
              "
            >
              <button type="button" class="block h-14 w-full" (click)="selectMedia.emit(image.id)">
                <img
                  [src]="image.image"
                  [alt]="variation.name"
                  class="h-full w-full object-cover"
                />
              </button>

              <button
                type="button"
                class="absolute right-0.5 top-0.5 flex h-6 w-6 items-center justify-center rounded-full bg-black/65 text-white opacity-0 transition group-hover:opacity-100"
                (click)="deleteMedia.emit(image.id)"
              >
                <i class="pi pi-trash text-[2px]"></i>
              </button>
            </div>
          }
        </div>
      </div>

      <label
        for="uploadMediaInput"
        class="flex h-23 cursor-pointer flex-col items-center justify-center rounded-[14px] border border-dashed border-[#d0d5dd] bg-[#fcfcfd] text-center transition hover:bg-white"
      >
        <i class="pi pi-upload mb-2 text-[16px] text-[#98a2b3]"></i>
        <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-[#667085]">
          Upload Media
        </span>
      </label>

      <input
        id="uploadMediaInput"
        type="file"
        accept="image/*"
        class="hidden"
        (change)="onFileInput($event)"
      />
    </div>
  }
</div>
