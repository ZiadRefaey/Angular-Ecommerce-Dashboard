<div
  class="rounded-[18px] border border-[#dde5ef] bg-white p-6 shadow-[0_1px_2px_rgba(16,24,40,0.04)]"
>
  <div class="mb-6 flex items-center gap-3">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-[#eef4ff] text-[#2f6bff]">
      <i class="pi pi-image text-[14px]"></i>
    </div>
    <h2 class="text-[16px] font-semibold text-[#101828]">Product Media</h2>
  </div>

  @if (variation) {
    <div class="space-y-5">
      <div class="overflow-hidden rounded-[14px] bg-[#101828]">
        <img [src]="variation.image" [alt]="variation.name" class="h-62.5 w-full object-cover" />
      </div>

      <div>
        <div class="mb-3 flex items-center justify-between">
          <p class="text-[11px] font-semibold uppercase tracking-[0.08em] text-[#7b8aa0]">
            Media Gallery ({{ variation.media.length }})
          </p>
          @if (!canDeleteMedia) {
            <span class="text-[11px] font-medium text-[#98a2b3]">At least one image is required</span>
          }
        </div>

        <div class="grid grid-cols-3 gap-3">
          @for (image of variation.media; track image.id) {
            <div
              class="group relative overflow-hidden rounded-[12px] border transition"
              [ngClass]="
                image.isDefault
                  ? 'border-[#2f6bff] ring-2 ring-[#2f6bff] shadow-[0_0_0_4px_rgba(47,107,255,0.12)]'
                  : 'border-[#e4e7ec]'
              "
            >
              <button type="button" class="relative block h-24 w-full overflow-hidden" (click)="selectMedia.emit(image.id)">
                <img
                  [src]="image.image"
                  [alt]="variation.name"
                  class="h-full w-full object-cover transition duration-200 group-hover:scale-105"
                />
                <div class="absolute inset-0 bg-[#101828]/0 transition group-hover:bg-[#101828]/35"></div>

                @if (image.isDefault) {
                  <div class="absolute bottom-1.5 left-1/2 inline-flex max-w-[calc(100%-0.75rem)] -translate-x-1/2 items-center rounded-full bg-[#2f6bff] px-2 py-0.5 text-[9px] font-semibold uppercase tracking-[0.06em] text-white shadow-sm">
                    <span>Default</span>
                  </div>
                }
              </button>

              <div class="absolute left-2 top-2 z-10 flex items-center gap-1 opacity-0 transition group-hover:opacity-100">
                <label
                  [for]="'replaceMediaInput-' + image.id"
                  class="flex h-7 w-7 cursor-pointer items-center justify-center rounded-full bg-black/65 text-white transition hover:bg-[#2f6bff]"
                >
                  <i class="pi pi-pencil text-[11px]"></i>
                </label>

                <input
                  [id]="'replaceMediaInput-' + image.id"
                  type="file"
                  accept="image/*"
                  class="hidden"
                  (change)="onReplaceInput(image.id, $event)"
                />

                @if (canDeleteMedia) {
                  <button
                    type="button"
                    class="flex h-7 w-7 items-center justify-center rounded-full bg-black/65 text-white transition hover:bg-[#f04438]"
                    (click)="deleteMedia.emit(image.id)"
                  >
                    <i class="pi pi-trash text-[11px]"></i>
                  </button>
                }
              </div>
            </div>
          }
        </div>
      </div>

      <label
        for="uploadMediaInput"
        class="flex h-23 cursor-pointer flex-col items-center justify-center rounded-[14px] border border-dashed border-[#d0d5dd] bg-[#fcfcfd] text-center transition hover:bg-white"
      >
        <i class="pi pi-upload mb-2 text-[16px] text-[#98a2b3]"></i>
        <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-[#667085]">
          Upload Media
        </span>
      </label>

      <input
        id="uploadMediaInput"
        type="file"
        accept="image/*"
        class="hidden"
        (change)="onFileInput($event)"
      />
    </div>
  }
</div>
