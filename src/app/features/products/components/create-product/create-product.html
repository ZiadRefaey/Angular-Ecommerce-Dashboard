<app-modal
  [isOpen]="isOpen"
  title="Add New Product"
  [widthClass]="'max-w-[560px]'"
  (closed)="onClose()"
>
  <div class="space-y-5">
    <!-- subtitle -->
    <p class="-mt-2 text-[12px] text-[#98a2b3]">
      Populate your inventory with a new electronic device.
    </p>

    <!-- product name -->
    <div>
      <label
        class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
      >
        Product Name
      </label>

      <input
        type="text"
        [(ngModel)]="productName"
        placeholder="e.g. MacBook Pro 14-inch (M3 Max)"
        class="h-10.5 w-full rounded-lg border border-[#eaecf0] bg-[#f9fafb] px-4 text-[14px] text-[#101828] outline-none placeholder:text-[#98a2b3] focus:border-[#2f6bff] focus:bg-white"
      />
    </div>

    <!-- grid -->
    <div class="grid grid-cols-1 gap-4 md:grid-cols-[170px_1fr]">
      <!-- image upload -->
      <div>
        <label
          class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
        >
          Product Image
        </label>

        <label
          for="productImage"
          class="flex h-30 w-full cursor-pointer flex-col items-center justify-center rounded-[10px] border border-dashed border-[#d0d5dd] bg-[#f9fafb] text-center transition hover:bg-white"
        >
          <i class="pi pi-image mb-2 text-[26px] text-[#cbd5e1]"></i>
          <span class="text-[10px] font-semibold uppercase tracking-[0.08em] text-[#c0c7d4]">
            Select Image
          </span>
        </label>

        <input
          id="productImage"
          type="file"
          class="hidden"
          accept="image/*"
          (change)="onFileChange($event)"
        />

        <p *ngIf="selectedFileName" class="mt-2 truncate text-[11px] text-[#98a2b3]">
          {{ selectedFileName }}
        </p>
      </div>

      <!-- right side fields -->
      <div class="space-y-4">
        <!-- category -->
        <div>
          <label
            class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
          >
            Category
          </label>

          <div class="relative">
            <select
              [(ngModel)]="category"
              class="h-10.5 w-full appearance-none rounded-lg border border-[#eaecf0] bg-[#f9fafb] px-4 pr-10 text-[14px] text-[#667085] outline-none focus:border-[#2f6bff] focus:bg-white"
            >
              <option value="" disabled selected>Choose Category</option>
              <option value="laptops">Laptops</option>
              <option value="phones">Phones</option>
              <option value="audio">Audio</option>
              <option value="gaming">Gaming</option>
            </select>

            <i
              class="pi pi-angle-down pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-[12px] text-[#98a2b3]"
            ></i>
          </div>
        </div>

        <!-- unit price -->
        <div>
          <label
            class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
          >
            Unit Price
          </label>

          <div class="relative">
            <input
              type="text"
              [(ngModel)]="unitPrice"
              placeholder="0.00"
              class="h-10.5 w-full rounded-lg border border-[#eaecf0] bg-[#f9fafb] px-4 pr-32.5 text-[14px] text-[#101828] outline-none placeholder:text-[#98a2b3] focus:border-[#2f6bff] focus:bg-white"
            />

            <span
              class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-[#98a2b3]"
            >
              Egyptian Pounds EGP
            </span>
          </div>
        </div>

        <!-- stock -->
        <div>
          <label
            class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.08em] text-[#667085]"
          >
            Stock Inventory
          </label>

          <div class="relative">
            <i
              class="pi pi-box absolute left-3 top-1/2 -translate-y-1/2 text-[12px] text-[#98a2b3]"
            ></i>

            <input
              type="text"
              [(ngModel)]="stockUnits"
              placeholder="0 Units"
              class="h-10.5 w-full rounded-lg border border-[#eaecf0] bg-[#f9fafb] pl-9 pr-4 text-[14px] text-[#101828] outline-none placeholder:text-[#98a2b3] focus:border-[#2f6bff] focus:bg-white"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- footer -->
    <div class="flex items-center justify-end gap-3 border-t border-[#eaecf0] pt-4">
      <button
        type="button"
        class="rounded-lg px-4 py-2 text-[11px] font-semibold uppercase tracking-[0.12em] text-[#667085] transition hover:bg-[#f9fafb]"
        (click)="onClose()"
      >
        Cancel
      </button>

      <button
        type="button"
        class="rounded-lg bg-[#2f6bff] px-5 py-2.5 text-[11px] font-semibold uppercase tracking-[0.12em] text-white shadow-[0_8px_20px_rgba(47,107,255,0.25)] transition hover:opacity-95"
        (click)="onCreateProduct()"
      >
        Create Product
      </button>
    </div>
  </div>
</app-modal>
