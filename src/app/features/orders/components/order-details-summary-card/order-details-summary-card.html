<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="mb-4 text-lg font-semibold text-slate-900">Order Summary</h2>

  <div class="space-y-3 text-sm">
    <div class="flex items-center justify-between text-slate-600">
      <span>Subtotal</span>
      <span>{{ summary.subtotal }}</span>
    </div>

    <div class="flex items-center justify-between text-slate-600">
      <span>Discount</span>
      <span>{{ summary.discount }}</span>
    </div>

    <div class="flex items-center justify-between text-slate-600">
      <span>Shipping Fee</span>
      <span>{{ summary.shippingFee }}</span>
    </div>

    <div class="flex items-center justify-between text-slate-600">
      <span>Payment Method</span>
      <span>{{ summary.paymentMethod }}</span>
    </div>

    <div class="flex items-center justify-between text-slate-600">
      <span>Payment Status</span>
      <span>{{ summary.paymentStatus }}</span>
    </div>

    <div class="flex items-center justify-between text-slate-600">
      <span>Coupon</span>
      <span>{{ summary.coupon }}</span>
    </div>

    <div class="border-t border-slate-200 pt-3">
      <div class="flex items-center justify-between font-semibold text-slate-900">
        <span>Total</span>
        <span>{{ summary.total }}</span>
      </div>
    </div>
  </div>
</section>
