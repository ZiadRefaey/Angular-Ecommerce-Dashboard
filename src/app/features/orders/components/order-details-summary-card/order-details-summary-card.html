<section
  class="rounded-2xl bg-[#0F172A] to-90 p-5 shadow-sm text-[#94A3B8] relative overflow-hidden"
>
  <div class="absolute -top-12 -right-12 size-48 rounded-full gradient-circle"></div>
  <div class="space-y-3 text-sm relative z-100">
    <div class="flex items-center justify-between">
      <span>Subtotal</span>
      <span>{{ summary.subtotal }}</span>
    </div>

    <div class="flex items-center justify-between">
      <span>Shipping Fee</span>
      <span>{{ summary.shippingFee }}</span>
    </div>

    <div class="flex items-center justify-between">
      <span>Payment Method</span>
      <span>{{ summary.paymentMethod }}</span>
    </div>

    <div class="flex items-center justify-between">
      <span>Payment Status</span>
      <span>{{ summary.paymentStatus }}</span>
    </div>

    <div class="border-t border-[#94A3B8] pt-3">
      <div class="flex items-center justify-between font-semibold text-white text-lg">
        <span>Total</span>
        <span class="text-[#3B82F6] font-bold text-2xl">{{ summary.total }}</span>
      </div>
    </div>
  </div>
</section>
