<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="mb-4 text-lg font-semibold text-slate-900">Customer Details</h2>

  <div class="space-y-4 text-sm">
    <div>
      <p class="mb-1 text-xs font-medium uppercase tracking-wide text-slate-400">Full Name</p>
      <p class="font-medium text-slate-900">{{ customer.name }}</p>
    </div>

    <div>
      <p class="mb-1 text-xs font-medium uppercase tracking-wide text-slate-400">Email Address</p>
      <p class="text-slate-600">{{ customer.email }}</p>
    </div>

    <div>
      <p class="mb-1 text-xs font-medium uppercase tracking-wide text-slate-400">Phone Number</p>
      <p class="text-slate-600">{{ customer.phone }}</p>
    </div>
  </div>
</section>
