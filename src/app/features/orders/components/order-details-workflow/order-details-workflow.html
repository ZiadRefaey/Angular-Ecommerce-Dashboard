<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="mb-4 text-lg font-semibold text-slate-900">Order Actions</h2>

  <div class="flex flex-wrap gap-3">
    <app-button
      label="Pending"
      [variant]="getVariant('pending')"
      (click)="setSelectedStatus('pending')"
    ></app-button>

    <app-button
      label="Processing"
      [variant]="getVariant('processing')"
      (click)="setSelectedStatus('processing')"
    ></app-button>

    <app-button
      label="Ship Order"
      icon="pi pi-truck"
      [variant]="getVariant('shipped')"
      (click)="setSelectedStatus('shipped')"
    ></app-button>

    <app-button
      label="Delivered"
      icon="pi pi-check-circle"
      [variant]="getVariant('delivered')"
      (click)="setSelectedStatus('delivered')"
    ></app-button>

    <app-button
      label="Cancel Order"
      icon="pi pi-times"
      [variant]="getVariant('cancelled')"
      (click)="setSelectedStatus('cancelled')"
    ></app-button>
  </div>
</section>
